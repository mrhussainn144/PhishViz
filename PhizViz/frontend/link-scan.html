<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Detector</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <link rel="stylesheet" href="/frontend/css/buttons.css">
  <link rel="stylesheet" href="/frontend/css/cards.css">
  <link rel="stylesheet" href="/frontend/css/background.css">
  <link rel="icon" href="/frontend/assets/images/logo.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <header class="nav">
    <div class="nav__inner">
      <div class="brand">
        <img src="/frontend/assets/images/logo.jpeg" alt="PhishViz" class="brand__logo">
        <span class="brand__name">PhishViz</span>
      </div>
      <nav class="nav__links">
        <a href="/frontend/index.html">Home</a>
        <a href="/frontend/email-scan.html">Email Analyzer</a>
        <a href="/frontend/link-scan.html" class="active">Link Detector</a>
        <a href="/frontend/document-scan.html">Document Scanner</a>
        <a href="/frontend/stego-kit.html">Steganography Kit</a>
        <a href="/frontend/dashboard.html">Threat Dashboard</a>
        <a href="/frontend/reports.html">Reports</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="hero hero--with-bg">
      <canvas id="particles"></canvas>
      <div class="hero-visual"></div>
      <div class="hero__content">
        <h1 class="hero__title">Link <span class="accent">Detector</span></h1>
        <p class="hero__subtitle">Check a URL for phishing indicators and risk.</p>
        <div class="form-stack">
          <textarea id="urlInput" class="input textarea textarea--no-resize url-input" rows="1"
            placeholder="Paste a URL (https://...)"></textarea>
          <div class="form-actions">
            <button id="analyzeBtn" class="btn btn--info" type="button">Scan Link</button>
          </div>
          <div id="result" class="result-box"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/frontend/js/animations.js"></script>
  <script src="/frontend/js/link.js"></script>
</body>

</html>
